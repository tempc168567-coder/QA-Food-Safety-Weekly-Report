name: Deploy to GitHub Pages

# 靜態網站（index.html 位於專案根目錄）。合併到 master 後自動部署，
# 亦可於 Actions 頁面手動觸發（workflow_dispatch）。
# 前置設定（僅需一次）：Settings → Pages → Build and deployment → Source 選「GitHub Actions」。

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個部署，取消進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 部署整個專案根目錄（index.html / app.js / data.js / style.css / 圖片）
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
